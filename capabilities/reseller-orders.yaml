naftiko: 1.0.0-alpha2
info:
  label: Ingram Micro Reseller API — Orders
  description: 'Ingram Micro Reseller API — Orders. 2 operations. Lead operation: Create Order. Self-contained Naftiko capability
    covering one Ingram Micro business surface.'
  tags:
  - Ingram Micro
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INGRAM_MICRO_API_KEY: INGRAM_MICRO_API_KEY
capability:
  consumes:
  - type: http
    namespace: reseller-orders
    baseUri: https://api.ingrammicro.com/resellers/v6
    description: Ingram Micro Reseller API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: createorder
        method: POST
        description: Create Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-orderId
      path: /orders/{orderId}
      operations:
      - name: getorderstatus
        method: GET
        description: Get Order Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: reseller-orders-rest
    port: 8080
    description: REST adapter for Ingram Micro Reseller API — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: POST
        name: createorder
        description: Create Order
        call: reseller-orders.createorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}
      name: orders-orderid
      description: REST surface for orders-orderId.
      operations:
      - method: GET
        name: getorderstatus
        description: Get Order Status
        call: reseller-orders.getorderstatus
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reseller-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ingram Micro Reseller API — Orders. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-order
      description: Create Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: reseller-orders.createorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order-status
      description: Get Order Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reseller-orders.getorderstatus
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
