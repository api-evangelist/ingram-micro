aid: ingram-micro
url: https://raw.githubusercontent.com/api-evangelist/ingram-micro/refs/heads/main/apis.yml
apis:
  - aid: ingram-micro:reseller-api
    name: Ingram Micro Reseller API
    tags:
      - IT Distribution
      - Reseller
      - Catalog
      - Pricing
      - Orders
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.ingrammicro.com
    humanURL: https://developer.ingrammicro.com/reseller/api-documentation/United_States
    properties:
      - url: https://developer.ingrammicro.com/reseller/api-documentation/United_States
        type: Documentation
      - url: openapi/ingram-micro-reseller-api-openapi.yml
        type: OpenAPI
    description: >-
      The Ingram Micro Reseller API provides REST API access to product
      catalog, pricing, discounts, stock levels, order management, and
      order status for IT resellers. It uses OAuth 2.0 authentication and
      provides a sandbox environment for testing.
  - aid: ingram-micro:vendor-api
    name: Ingram Micro Vendor API
    tags:
      - IT Distribution
      - Vendor
      - Supply Chain
      - Inventory
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.ingrammicro.com
    humanURL: https://developer.ingrammicro.com/vendor/api-documentation
    properties:
      - url: https://developer.ingrammicro.com/vendor/api-documentation
        type: Documentation
      - url: openapi/ingram-micro-vendor-api-openapi.yml
        type: OpenAPI
    description: >-
      The Ingram Micro Vendor API provides REST API access for technology
      vendors to scale their business through Ingram Micro's distribution
      network, with access to inventory management, order processing, and
      supply chain integration.
